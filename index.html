<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Productos Innovadores - Sitio Web Optimizado SEO</title>

    <meta name="description" content="Descubre nuestros productos destacados con imágenes optimizadas y una experiencia rápida y accesible.">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>Productos Innovadores</h1>

        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#productos">Productos</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>


    <main>

        <section id="inicio" class="hero">

            <img 
            src="img/wiki.webp
            "alt="Inicio de Wikipedia">

            <div class="hero-texto">
                <h2>Este es la primer imagen que se muestra cuando inicias en wikipedia</h2>
            </div>

        </section>


        <section id="productos">

            <h2>Nuestros productos</h2>


            <div class="galeria">


                <article class="card">

                    <img 
                    src="img/producto1.webp" 
                    alt="Producto número uno con diseño moderno">

                    <h3>Producto 1</h3>

                    <p>
                        Producto de alta calidad con excelente rendimiento.
                    </p>

                </article>



                <article class="card">

                    <img 
                    src="img/producto2.webp" 
                    alt="Producto número dos destacado">

                    <h3>Producto 2</h3>

                    <p>
                        Solución práctica y moderna para usuarios.
                    </p>

                </article>


            </div>

        </section>


    </main>


    <footer id="contacto">

        <p>
            Proyecto SEO - HTML5 y CSS3
        </p>

    </footer>


</body>

</html>
